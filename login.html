<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin Login</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="login-body">
    <main class="login-screen">
      <section class="login-card">
        <a class="brand" href="index.html">P</a>
        <h1>Admin Login</h1>
        <form id="loginForm" class="login-form">
          <label>Username<input id="adminUser" autocomplete="username" /></label>
          <label>Password
            <span class="password-wrap">
              <input id="adminPass" type="password" autocomplete="current-password" />
              <button id="togglePassword" class="password-toggle" type="button" aria-label="Show password" aria-pressed="false">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
              </button>
            </span>
          </label>
          <button class="pill" type="submit">Login</button>
          <p id="loginError" class="login-error" aria-live="polite"></p>
        </form>
      </section>
    </main>
    <script src="login.js"></script>
  </body>
</html>
